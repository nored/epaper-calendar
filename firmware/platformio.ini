; PlatformIO project for the Waveshare ESP32-S3-ePaper-13.3E6 calendar client.
; Board: ESP32-S3 module with 32 MB QIO flash + 8 MB Octal PSRAM.
;
; Module: ESP32-S3-WROOM-2-N32R16V = 32 MB OCTAL (OPI) flash + 16 MB OCTAL PSRAM.
; WROOM-2 is the octal-flash variant, so memory_type=opi_opi and flash_mode=dout
; (the safe header value; the chip runs OPI). This is why the ROM prints "Octal
; Flash Mode Enabled" and why a QIO build hits the do_core_init flash assert.
; Note: the vendor's Arduino-IDE screenshot shows "Flash Mode: QIO" because that
; menu has no OPI option — for OPI-flash boards Arduino handles octal via the
; board variant. PlatformIO's equivalent is memory_type=opi_opi, NOT flash_mode=qio.
;
; Partition scheme intentionally differs from the vendor's "32M (4.8MB APP/22MB
; FATFS)": that is single-app with no OTA, and this firmware stages OTA by
; boot-partition swap, so we use a 32 MB dual-OTA table (no app filesystem).

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.arduino.memory_type = opi_opi
board_build.flash_mode = dout
board_build.f_flash = 80000000L
board_upload.flash_size = 32MB
board_build.partitions = partitions_32MB_ota.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3

lib_deps =
