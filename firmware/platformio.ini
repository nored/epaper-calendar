; PlatformIO project for the Waveshare ESP32-S3-ePaper-13.3E6 calendar client.
; Board is an ESP32-S3 (N16R8): 16 MB flash + 8 MB Octal PSRAM.

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; 16 MB flash, Octal PSRAM (qio flash + opi psram).
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3

lib_deps =
