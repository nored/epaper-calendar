# Portainer Stack for the e-paper calendar server.
# In Portainer: Stacks -> Add stack -> Repository, point "Compose path" at this
# file. Portainer builds the image from server/Dockerfile and runs it.
#
# The build context is the repo root (not ./server) because server/Dockerfile is
# multi-stage: it compiles the ESP32 firmware from firmware/ and bakes the OTA
# image into the server, so a push to main ships new firmware to the device with
# no extra step. Still a single service — the firmware-builder in
# docker-compose.build.yml is unrelated and untouched.
services:
  epaper-calendar:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: epaper-calendar:latest
    container_name: epaper-calendar
    restart: unless-stopped
    ports:
      # host:container — reach the control panel at http://<OMV-IP>:8090
      - "8090:3000"
    environment:
      # The server computes "refresh at local midnight" and stamps German dates,
      # so it must know the timezone. Containers default to UTC otherwise.
      - TZ=Europe/Berlin
    volumes:
      # Persists config.json + cache/ + status.json across rebuilds/restarts.
      - epaper-data:/app/data

volumes:
  epaper-data:
